<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculadora">
        <div class="display"> <p id="resultado">0</p></div>
        
        <div class="botoes">
  <button class="limpar" onclick="limpar()">C</button>
  <button onclick="inverterSinal()">+/-</button>
  <button onclick="calcularPorcentagem()">%</button>
  <button class="operador" onclick="clicarOperador('÷')">÷</button>

  <button onclick="clicarNumero('7')">7</button>
  <button onclick="clicarNumero('8')">8</button>
  <button onclick="clicarNumero('9')">9</button>
  <button class="operador" onclick="clicarOperador('×')">×</button>

  <button onclick="clicarNumero('4')">4</button>
  <button onclick="clicarNumero('5')">5</button>
  <button onclick="clicarNumero('6')">6</button>
  <button class="operador" onclick="clicarOperador('-')">-</button>

  <button onclick="clicarNumero('1')">1</button>
  <button onclick="clicarNumero('2')">2</button>
  <button onclick="clicarNumero('3')">3</button>
  <button class="operador" onclick="clicarOperador('+')">+</button>

  <button class="zero" onclick="clicarNumero('0')">0</button>
  <button onclick="clicarNumero('.')">.</button>
  <button class="operador" onclick="calcular()">=</button>
</div>
        
    </div>
    <script src="script.js"></script>
</body>
</html>
